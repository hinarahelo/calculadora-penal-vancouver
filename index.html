<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora Penal - Snow</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>Tribunal da Cidade de Snow</h1>
  <p>Calculadora Penal</p>
</header>

<main class="container">

  <!-- BUSCA -->
  <section class="panel">
    <h3>Busca de artigos</h3>

    <input type="text" id="searchInput" placeholder="Digite o nome ou número do artigo">

    <div class="buttons">
      <button id="searchButton">Buscar</button>
      <button id="showAllButton">Mostrar todos</button>
      <button id="clearSearchButton">Limpar</button>
    </div>

    <div id="artigosContainer"></div>
  </section>

  <!-- SELECIONADOS -->
  <section class="panel">
    <h3>Artigos selecionados</h3>
    <div id="selecionadosResumo">Nenhum artigo selecionado.</div>
  </section>

  <!-- REDUÇÕES -->
  <section class="panel side-panel">
    <span class="section-kicker">REDUÇÕES DE PENA</span>
    <h3>Redução aplicada</h3>

    <div class="check-group">
      <label>
        <input type="checkbox" id="reducaoBomComportamento">
        Bom comportamento — redução de até 5% da pena
      </label>

      <label>
        <input type="checkbox" id="reducaoReuPrimario">
        Réu primário — redução de 20% da pena aplicada
      </label>

      <label>
        <input type="checkbox" id="reducaoCumplice">
        Cúmplice — redução de até 25% da pena
      </label>
    </div>

    <div class="inline-field">
      <label for="cumplicePercent">Percentual do cúmplice (até 25%)</label>
      <input id="cumplicePercent" type="number" min="0" max="25" step="1" placeholder="Ex: 15">
    </div>
  </section>

  <!-- AGRAVANTES -->
  <section class="panel side-panel">
    <h3>Agravantes</h3>

    <label>
      <input type="checkbox" id="agravanteServidor">
      Crime contra servidor público
    </label>
  </section>

  <!-- HONORÁRIOS -->
  <section class="panel side-panel">
    <h3>Honorários</h3>

    <label><input type="checkbox" class="honorario" data-valor="5000"> Advogado particular — R$ 5.000</label>
    <label><input type="checkbox" class="honorario" data-valor="10000"> Advogado premium — R$ 10.000</label>
  </section>

  <!-- AÇÕES -->
  <section class="panel actions">
    <button onclick="calcular()">Calcular</button>
    <button onclick="limparCalculo()">Limpar</button>
  </section>

  <!-- RESULTADO -->
  <section class="panel result">
    <div id="resultado"></div>
  </section>

</main>

<script src="script.js"></script>

</body>
</html>
